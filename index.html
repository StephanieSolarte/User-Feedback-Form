<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Feedback Form</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container" id="page-container">
    <h1>User Feedback Form</h1>
    <p class="subtitle">Share your feedback below</p>

    <form id="feedback-form">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Enter your name" />
        <small class="tooltip">Please type your full name.</small>
        <small class="error" id="name-error"></small>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" />
        <small class="tooltip">Enter a valid email address.</small>
        <small class="error" id="email-error"></small>
      </div>

      <div class="form-group">
        <label for="comments">Comments</label>
        <textarea id="comments" rows="5" placeholder="Write your feedback here..."></textarea>
        <small class="tooltip">Share your thoughts or suggestions.</small>
        <small class="char-count" id="char-count">Characters: 0</small>
        <small class="error" id="comments-error"></small>
      </div>

      <button type="submit">Submit Feedback</button>
    </form>

    <div id="feedback-display">
      <h2>Submitted Feedback</h2>
    </div>
  </div>

  <script src="cp_1.js"></script>
</body>
</html>
